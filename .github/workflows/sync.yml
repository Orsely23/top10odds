name: Hourly Odds Update
on:
  schedule:
    - cron: '0 * * * *' # This runs every hour on the dot
  workflow_dispatch: # This adds the "Run manually" button we need

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Real-Time Polymarket Data
       run: curl "https://gamma-api.polymarket.com/events?active=true&closed=false&archived=false&limit=50" -o data.json

      - name: Save Data to Repository
        run: |
          git config user.name "DataBot"
          git config user.email "bot@top10oddslive.com"
          git add data.json
          git commit -m "Sync Live Odds from Gamma API" || exit 0
          git push
