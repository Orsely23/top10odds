<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Odds Feed</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        #status {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Group Container */
        .event-group {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .event-group:hover {
            border-color: #444;
        }

        /* Main Headline Row */
        .main-market {
            display: flex;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            position: relative;
        }

        .percentage {
            color: var(--accent);
            font-size: 2rem;
            font-weight: 800;
            min-width: 85px;
            text-align: center;
        }

        .text {
            flex-grow: 1;
            padding: 0 20px;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .choice-label {
            display: block;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .volume-badge {
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .expand-btn {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 15px;
            width: 30px;
            text-align: center;
        }

        /* Sub-Markets (Hidden Area) */
        .sub-markets {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            padding: 10px 20px 20px 105px;
        }

        .sub-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            font-size: 0.95rem;
        }

        .sub-item:last-child { border-bottom: none; }

        .sub-prob {
            color: var(--accent);
            font-weight: bold;
            width: 45px;
        }

        .sub-choice {
            flex-grow: 1;
            color: var(--text-dim);
        }

        /* Footer/Load Button */
        #load-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--card);
            color: var(--text-dim);
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 20px 0 100px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP LIVE ODDS</h1>
        <div id="status">SYNCING BRAIN...</div>
    </header>

    <div id="odds-list"></div>
    <div id="load-btn" onclick="loadNext()">SCROLL FOR MORE</div>
</div>



<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    const btn = document.getElementById('load-btn');
    
    let groupedEvents = []; 
    let currentIndex = 0; 
    const itemsPerPage = 12;

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            
            const groups = {};

            // 1. CLUSTER & FILTER
            rawData.forEach(event => {
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                if (!event.markets) return;

                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let prices = market.outcomePrices;
                        if (typeof prices === 'string') prices = JSON.parse(prices);
                        p = Array.isArray(prices) ? parseFloat(prices[0]) : parseFloat(market.price || 0);
                    } catch(e) {}

                    const prob = Math.round(p * 100);
                    
                    // BRAIN FILTER: Hide under 5% and over 95%
                    if (prob < 5 || prob > 95 || market.active === false) return;

                    if (!groups[title]) {
                        groups[title] = {
                            title: title,
                            volume: parseFloat(event.volume || 0),
                            markets: []
                        };
                    }
                    groups[title].markets.push({
                        prob: prob,
                        choice: market.groupItemTitle || "Yes"
                    });
                });
            });

            // 2. SORT TOPICS BY VOLUME & SUB-MARKETS BY PROBABILITY
            groupedEvents = Object.values(groups)
                .filter(g => g.markets.length > 0)
                .sort((a, b) => b.volume - a.volume);
            
            groupedEvents.forEach(g => {
                g.markets.sort((a, b) => b.prob - a.prob);
            });

            status.style.color = "#00ff88";
            status.innerText = `● SYSTEM LIVE: ${groupedEvents.length} TOPICS`;
            
            list.innerHTML = "";
            currentIndex = 0;
            loadNext();

        } catch (e) {
            status.innerText = "OFFLINE - CHECK DATA SOURCE";
        }
    }

    function loadNext() {
        if (currentIndex >= groupedEvents.length) {
            btn.innerText = "END OF LIST";
            return;
        }

        const nextBatch = groupedEvents.slice(currentIndex, currentIndex + itemsPerPage);
        
        nextBatch.forEach((group, index) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + index}`;

            let html = `
            <div class="event-group">
                <div class="main-market" onclick="toggleGroup('${groupId}')">
                    <span class="percentage">${main.prob}%</span>
                    <div class="text">
                        ${group.title}
                        <span class="choice-label">Front-runner: ${main.choice}</span>
                    </div>
                    <span class="volume-badge">${formatVol(group.volume)}</span>
                    ${hasMore ? `<span class="expand-btn" id="btn-${groupId}">+</span>` : ''}
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span class="sub-prob">${m.prob}%</span>
                            <span class="sub-choice">${m.choice}</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });

        currentIndex += itemsPerPage;
        btn.innerText = `LOAD MORE (${groupedEvents.length - currentIndex} TOPICS REMAINING)`;
    }

    // Toggle Function for the [+]
    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        const btnText = document.getElementById(`btn-${id}`);
        if (el.style.display === "block") {
            el.style.display = "none";
            if (btnText) btnText.innerText = "+";
        } else {
            el.style.display = "block";
            if (btnText) btnText.innerText = "-";
        }
    };

    // Auto-Scroll Engine
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) {
            if (currentIndex < groupedEvents.length) loadNext();
        }
    };

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>

</body>
</html>
