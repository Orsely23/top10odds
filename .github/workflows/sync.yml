name: Hourly Odds Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          # This uses the secret you'll add in Step 2
          token: ${{ secrets.MY_TOKEN }}

      - name: Fetch Active Polymarket Data
        run: |
          curl "https://gamma-api.polymarket.com/events?active=true&closed=false&archived=false&limit=50" -o data.json

      - name: Save and Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Sync Live Odds" || exit 0
          git push origin main
