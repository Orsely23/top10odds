<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Live Odds</title>
    
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><path d='M20 70 l20-20 l15 15 l30-35 M85 30 l0 15 M85 30 l-15 0' stroke='%2300ff88' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0 20px 0;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            color: #fff;
        }

        .status-area {
            margin: 10px 0 20px 0;
        }

        #status {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #last-update {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Sticky Search Bar */
        .search-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 30px;
        }

        #search-input {
            width: 100%;
            padding: 15px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: border-color 0.2s;
        }

        #search-input:focus {
            border-color: var(--accent);
        }

        /* Clustered Event Group Card */
        .event-group {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Green Hover Glow */
        .event-group:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .main-market {
            display: flex;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        .percentage {
            color: var(--accent);
            font-size: 2.2rem;
            font-weight: 800;
            min-width: 90px;
            text-align: center;
        }

        .text {
            flex-grow: 1;
            padding: 0 20px;
            font-size: 1.2rem;
            line-height: 1.3;
        }

        /* Large Sub-headline */
        .choice-label {
            display: block;
            color: var(--text-dim);
            font-size: 1.05rem; 
            margin-top: 6px;
        }

        .volume-badge {
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Direct Bet Link Button */
        .bet-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
            margin-left: 15px;
        }

        .bet-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .expand-btn {
            color: var(--accent);
            font-size: 1.6rem;
            font-weight: bold;
            margin-left: 15px;
            width: 20px;
            text-align: center;
        }

        /* Hidden Sub-Markets area */
        .sub-markets {
            display: none;
            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid var(--border);
            padding: 15px 25px 25px 110px;
        }

        .sub-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #222;
            font-size: 1.05rem;
        }

        .sub-item:last-child { border-bottom: none; }

        .sub-prob { color: var(--accent); font-weight: bold; width: 50px; }
        .sub-choice { flex-grow: 1; color: var(--text-dim); }

        #load-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--card);
            color: var(--text-dim);
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 20px 0 100px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP 10 LIVE ODDS</h1>
        <div class="status-area">
            <div id="status">CONNECTING...</div>
            <div id="last-update">Syncing time...</div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search 1,600+ markets (e.g. 'Bitcoin', 'NBA', 'Election')..." onkeyup="handleSearch()">
    </div>

    <div id="odds-list"></div>
    
    <div id="load-btn" onclick="loadNext()">SCROLL FOR MORE</div>
</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    const updateText = document.getElementById('last-update');
    const btn = document.getElementById('load-btn');
    const searchInput = document.getElementById('search-input');
    
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    const itemsPerPage = 12;

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            
            // Setup the Timestamp
            const now = new Date();
            updateText.innerText = `LAST UPDATE: ${now.toLocaleDateString()} AT ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            const groups = {};

            // 1. Cluster by Event Title
            rawData.forEach(event => {
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                const slug = event.slug || "";
                if (!event.markets) return;

                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let prices = market.outcomePrices;
                        if (typeof prices === 'string') prices = JSON.parse(prices);
                        p = Array.isArray(prices) ? parseFloat(prices[0]) : parseFloat(market.price || 0);
                    } catch(e) {}

                    const prob = Math.round(p * 100);
                    
                    // Filter: Hide "Long Shots" (under 5%) and "Done Deals" (over 95%)
                    if (prob < 5 || prob > 95 || market.active === false) return;

                    if (!groups[title]) {
                        groups[title] = {
                            title: title,
                            slug: slug,
                            volume: parseFloat(event.volume || 0),
                            markets: []
                        };
                    }
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            // 2. Sort Groups by Total Volume
            allGroupedData = Object.values(groups)
                .filter(g => g.markets.length > 0)
                .sort((a, b) => b.volume - a.volume);
            
            // 3. Sort sub-markets by probability
            allGroupedData.forEach(g => g.markets.sort((a, b) => b.prob - a.prob));
            
            filteredData = [...allGroupedData];
            renderInitial();

        } catch (e) {
            status.innerText = "OFFLINE";
            updateText.innerText = "CHECK DATA SOURCE";
        }
    }

    function renderInitial() {
        list.innerHTML = "";
        currentIndex = 0;
        status.innerText = `● SYSTEM LIVE: ${filteredData.length} TOPICS`;
        btn.style.display = filteredData.length > 0 ? 'block' : 'none';
        loadNext();
    }

    function handleSearch() {
        const query = searchInput.value.toLowerCase();
        filteredData = allGroupedData.filter(group => 
            group.title.toLowerCase().includes(query) || 
            group.markets.some(m => m.choice.toLowerCase().includes(query))
        );
        renderInitial();
    }

    function loadNext() {
        if (currentIndex >= filteredData.length) {
            btn.innerText = "END OF LIST";
            return;
        }

        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        
        nextBatch.forEach((group, index) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + index}`;
            const betUrl = `https://polymarket.com/event/${group.slug}`;

            let html = `
            <div class="event-group">
                <div class="main-market">
                    <div style="display: flex; align-items: center; flex-grow: 1;" onclick="toggleGroup('${groupId}')">
                        <span class="percentage">${main.prob}%</span>
                        <div class="text">
                            ${group.title}
                            <span class="choice-label">Front-runner: ${main.choice}</span>
                        </div>
                        <span class="volume-badge">${formatVol(group.volume)}</span>
                        ${hasMore ? `<span class="expand-btn" id="btn-${groupId}">+</span>` : ''}
                    </div>
                    <a href="${betUrl}" target="_blank" class="bet-btn">Wanna bet?</a>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span class="sub-prob">${m.prob}%</span>
                            <span class="sub-choice">${m.choice}</span>
                            <a href="${betUrl}" target="_blank" class="bet-btn" style="font-size: 0.7rem; padding: 4px 10px;">Wanna bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });

        currentIndex += itemsPerPage;
        btn.innerText = `SHOWING ${currentIndex} OF ${filteredData.length} TOPICS`;
    }

    // Toggle logic for the clustered groups
    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        const btnText = document.getElementById(`btn-${id}`);
        const isVisible = (el.style.display === "block");
        el.style.display = isVisible ? "none" : "block";
        if (btnText) btnText.innerText = isVisible ? "+" : "-";
    };

    // Infinite Scroll Logic
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
            if (currentIndex < filteredData.length) loadNext();
        }
    };

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>

</body>
</html>
