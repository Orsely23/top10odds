<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Live Odds</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><path d='M20 70 l20-20 l15 15 l30-35 M85 30 l0 15 M85 30 l-15 0' stroke='%2300ff88' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; scroll-behavior: smooth; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0 20px; }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        #status { font-size: 0.9rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        #last-update { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }
        
        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 30px; }
        #search-input { width: 100%; padding: 15px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; color: #fff; font-size: 1rem; outline: none; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }

        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; transition: 0.2s; }
        .event-group:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .main-market { display: flex; align-items: center; padding: 20px; cursor: pointer; }
        .percentage { color: var(--accent); font-size: 2.2rem; font-weight: 800; min-width: 90px; text-align: center; }
        .text { flex-grow: 1; padding: 0 20px; font-size: 1.2rem; line-height: 1.3; }
        .choice-label { display: block; color: var(--text-dim); font-size: 1.05rem; margin-top: 6px; }
        .volume-badge { background: rgba(48,54,61,0.5); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; color: var(--text-dim); }

        .bet-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-decoration: none; margin-left: 15px; transition: 0.2s; }
        .bet-btn:hover { background: var(--accent); color: #000; }
        .expand-btn { color: var(--accent); font-size: 1.6rem; font-weight: bold; margin-left: 15px; width: 20px; text-align: center; }

        .sub-markets { display: none; background: rgba(0,0,0,0.25); border-top: 1px solid var(--border); padding: 15px 25px 25px 110px; }
        .sub-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .sub-prob { color: var(--accent); font-weight: bold; width: 50px; }
        .sub-choice { flex-grow: 1; color: var(--text-dim); }
        
        /* Floating Back to Top Button */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
            z-index: 1000;
            font-weight: bold;
        }

        #load-sentinel { 
            height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-dim); 
            font-size: 0.9rem; 
            margin-top: 20px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
        }
        
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header id="top">
        <h1>TOP 10 LIVE ODDS</h1>
        <div class="status-area">
            <div id="status">CONNECTING...</div>
            <div id="last-update">Syncing time...</div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search 1,600+ markets..." onkeyup="handleSearch()">
    </div>

    <div id="odds-list"></div>
    <div id="load-sentinel">● SCROLL FOR MORE</div>

    <footer>
        <div class="footer-links">Data powered by <a href="https://polymarket.com" target="_blank">Polymarket</a></div>
        <p style="margin-top: 15px;">&copy; 2026 Top 10 Live Odds</p>
    </footer>
</div>

<div id="back-to-top" onclick="window.scrollTo(0,0)">↑</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    const updateText = document.getElementById('last-update');
    const sentinel = document.getElementById('load-sentinel');
    const searchInput = document.getElementById('search-input');
    const backToTopBtn = document.getElementById('back-to-top');
    
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    let isLoading = false; 
    const itemsPerPage = 15;

    // THE OBSERVER
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoading && currentIndex < filteredData.length) {
            loadNext();
        }
    }, { 
        rootMargin: '250px', // Balanced: loads ahead but lets you see the transition
        threshold: 0.01 
    });

    // BACK TO TOP VISIBILITY
    window.addEventListener('scroll', () => {
        if (window.scrollY > 500) {
            backToTopBtn.style.display = 'flex';
        } else {
            backToTopBtn.style.display = 'none';
        }
    });

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            
            const now = new Date();
            updateText.innerText = `LAST UPDATE: ${now.toLocaleDateString()} AT ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            const groups = {};
            rawData.forEach(event => {
                if (!event || !event.markets) return;
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                const slug = event.slug || "";
                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let pr = market.outcomePrices;
                        if (typeof pr === 'string') pr = JSON.parse(pr);
                        p = Array.isArray(pr) ? parseFloat(pr[0]) : parseFloat(market.price || 0);
                    } catch(e){}
                    const prob = Math.round(p * 100);
                    if (prob < 5 || prob > 95 || market.active === false) return;
                    if (!groups[title]) groups[title] = { title, slug, volume: parseFloat(event.volume || 0), markets: [] };
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            allGroupedData = Object.values(groups).filter(g => g.markets.length > 0).sort((a,b) => b.volume - a.volume);
            allGroupedData.forEach(g => g.markets.sort((a,b) => b.prob - a.prob));
            
            filteredData = [...allGroupedData];
            status.innerText = `● SYSTEM LIVE: ${filteredData.length} TOPICS`;
            
            list.innerHTML = "";
            currentIndex = 0;
            observer.observe(sentinel);

        } catch (e) { status.innerText = "OFFLINE"; }
    }

    function handleSearch() {
        const query = searchInput.value.toLowerCase();
        filteredData = allGroupedData.filter(g => g.title.toLowerCase().includes(query) || g.markets.some(m => m.choice.toLowerCase().includes(query)));
        
        list.innerHTML = "";
        currentIndex = 0;
        isLoading = false; 
        status.innerText = `● RESULTS: ${filteredData.length}`;
    }

    function loadNext() {
        if (currentIndex >= filteredData.length || isLoading) return;
        
        isLoading = true; 
        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        let html = "";
        
        nextBatch.forEach((group, idx) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + idx}`;
            const betUrl = group.slug ? `https://polymarket.com/event/${group.slug}` : `https://polymarket.com`;

            html += `
            <div class="event-group">
                <div class="main-market">
                    <div style="display:flex;align-items:center;flex-grow:1;" onclick="toggleGroup('${groupId}')">
                        <span class="percentage">${main.prob}%</span>
                        <div class="text">${group.title}<span class="choice-label">Front-runner: ${main.choice}</span></div>
                        <span class="volume-badge">${formatVol(group.volume)}</span>
                        ${hasMore ? `<span class="expand-btn" id="btn-${groupId}">+</span>` : ''}
                    </div>
                    <a href="${betUrl}" target="_blank" class="bet-btn">Wanna bet?</a>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span class="sub-prob">${m.prob}%</span>
                            <span class="sub-choice">${m.choice}</span>
                            <a href="${betUrl}" target="_blank" class="bet-btn" style="font-size:0.7rem;padding:4px 10px;">Wanna bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        });

        list.insertAdjacentHTML('beforeend', html);
        currentIndex += itemsPerPage;
        
        if (currentIndex >= filteredData.length) {
            sentinel.innerText = "END OF LIST";
        } else {
            sentinel.innerText = `SHOWING ${currentIndex} OF ${filteredData.length} - SCROLL FOR MORE`;
            isLoading = false; 
        }
    }

    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        const btnText = document.getElementById(`btn-${id}`);
        const isVisible = (el.style.display === "block");
        el.style.display = isVisible ? "none" : "block";
        if (btnText) btnText.innerText = isVisible ? "+" : "-";
    };

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>
</body>
</html>
