<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Odds Feed</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        #status {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .item {
            display: flex;
            align-items: center;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .percentage {
            color: #00ff88;
            font-size: 2rem;
            font-weight: 800;
            min-width: 85px;
            text-align: center;
        }

        .text {
            flex-grow: 1;
            padding: 0 20px;
            font-size: 1.1rem;
            color: #f0f6fc;
        }

        .choice-label {
            display: block;
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .volume-badge {
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid #484f58;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #8b949e;
        }

        #scroll-hint {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            border: 1px dashed #30363d;
            border-radius: 8px;
            margin: 20px 0 100px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP LIVE ODDS</h1>
        <div id="status">INITIALIZING...</div>
    </header>

    <div id="odds-list"></div>
    
    <div id="scroll-hint">Scroll down for more results</div>
</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    const hint = document.getElementById('scroll-hint');
    
    let allMarkets = []; 
    let currentIndex = 0; 
    const itemsPerPage = 10;

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            
            allMarkets = [];
            currentIndex = 0;
            list.innerHTML = "";

            // Sort by Volume
            rawData.sort((a, b) => parseFloat(b.volume || 0) - parseFloat(a.volume || 0));

            rawData.forEach(event => {
                const markets = event.markets || [];
                markets.forEach(market => {
                    let p = 0;
                    try {
                        let rawPrices = market.outcomePrices;
                        if (typeof rawPrices === 'string') rawPrices = JSON.parse(rawPrices);
                        p = Array.isArray(rawPrices) ? parseFloat(rawPrices[0]) : parseFloat(market.price || 0);
                    } catch(e) { p = 0; }
                    
                    const prob = Math.round(p * 100);
                    if (prob >= 99 || prob <= 1 || market.active === false) return;

                    allMarkets.push({
                        prob: prob,
                        title: (event.title || "").replace(/by ___ \?/g, "").trim(),
                        choice: market.groupItemTitle || "Yes",
                        volume: event.volume
                    });
                });
            });

            status.style.color = "#00ff88";
            status.innerText = `● SYSTEM LIVE: ${allMarkets.length} MARKETS`;
            
            // Load the first 10
            loadNext();
            
            // SETUP THE SENSOR (Intersection Observer)
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    loadNext();
                }
            }, { rootMargin: '200px' }); // Trigger 200px before the box is seen

            observer.observe(hint);

        } catch (e) {
            status.innerText = "OFFLINE";
        }
    }

    function loadNext() {
        if (currentIndex >= allMarkets.length) {
            hint.innerText = "END OF LIST";
            return;
        }

        const nextBatch = allMarkets.slice(currentIndex, currentIndex + itemsPerPage);
        let html = "";
        
        nextBatch.forEach(item => {
            html += `
            <div class="item">
                <span class="percentage">${item.prob}%</span>
                <div class="text">
                    ${item.title}
                    <span class="choice-label">Outcome: ${item.choice}</span>
                </div>
                <span class="volume-badge">${formatVol(item.volume)}</span>
            </div>`;
        });

        list.insertAdjacentHTML('beforeend', html);
        currentIndex += itemsPerPage;
    }

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>

</body>
</html>
