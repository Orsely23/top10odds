<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7D4T0JH70"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C7D4T0JH70');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OddsPulse | Global Market Intelligence</title>
    
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; --accent: #00ff88; --search-bg: #161b22; }
        body.bright-mode { --bg: #ffffff; --card: #f6f8fa; --border: #d0d7de; --text-main: #1f2328; --text-dim: #57606a; --accent: #00a35c; --search-bg: #ffffff; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; scroll-behavior: smooth; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 25px 0 10px; position: relative; }
        #theme-toggle { position: absolute; top: 0; right: 0; background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        h1 { font-size: 1.6rem; margin: 15px 0 5px; letter-spacing: -0.5px; text-transform: uppercase; }
        #status { font-size: 0.75rem; color: var(--accent); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .pulse-dot { width: 7px; height: 7px; background-color: var(--accent); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); } 100% { transform: scale(0.95); } }
        
        .search-container { position: sticky; top: 10px; z-index: 100; margin: 15px 0 20px 0; }
        #search-input { width: 100%; padding: 14px 22px; background: var(--search-bg); border: 2px solid var(--border); border-radius: 50px; color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #search-input:focus { border-color: var(--accent); }

        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; transition: 0.3s; }
        .event-group:hover { border-color: var(--accent); transform: translateY(-2px); }
        .main-market { display: flex; align-items: center; padding: 12px; gap: 5px; cursor: pointer; }
        
        .percentage-container { display: flex; align-items: center; justify-content: flex-end; min-width: 95px; }
        .momentum-icon { width: 18px; height: 18px; fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; margin-right: 8px; animation: iconPulse 2s infinite; }
        @keyframes iconPulse { 0% { opacity: 0.5; } 70% { opacity: 1; } 100% { opacity: 0.5; } }
        
        .percentage { color: var(--accent); font-size: 1.6rem; font-weight: 800; line-height: 1; text-align: right; }
        .text { flex-grow: 1; flex-shrink: 1; padding: 0 5px; font-size: 0.95rem; line-height: 1.2; font-weight: 600; overflow-wrap: break-word; }
        .choice-label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; font-weight: normal; }

        /* BUTTON LAYOUT FIX */
        .btn-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .vol-pill { background: rgba(139, 148, 158, 0.1); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; white-space: nowrap; }
        .bet-btn { background: var(--accent); color: #ffffff !important; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-decoration: none; white-space: nowrap; text-align: center; }
        .bet-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .sub-markets { display: none; background: rgba(0,0,0,0.15); border-top: 1px solid var(--border); padding: 5px 12px 12px 12px; }
        .sub-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 5px; }
        
        #back-to-top { position: fixed; bottom: 25px; right: 20px; background: var(--accent); color: #000; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 1000; border: none; }
        @media (min-width: 600px) { h1 { font-size: 2.2rem; } .main-market { padding: 20px; } .percentage { font-size: 2.2rem; } .text { font-size: 1.2rem; padding: 0 20px; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <button id="theme-toggle" onclick="toggleTheme()">☀️ Bright Mode</button>
        <h1>OddsPulse Live</h1>
        <div id="status"><span class="pulse-dot"></span> <span id="status-text">MOMENTUM SYNCED</span></div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search live momentum..." onkeyup="handleSearch()">
    </div>

    <div id="odds-list"></div>
    <button id="load-more-btn" style="width:100%; padding:18px; background:var(--card); color:var(--accent); border:2px solid var(--accent); border-radius:50px; font-weight:bold; cursor:pointer; margin:20px 0 50px 0;" onclick="loadNext()">Load More Results</button>

    <footer style="text-align:center; padding:40px 10px; color:var(--text-dim); font-size:0.75rem; border-top:1px solid var(--border);">
        &copy; 2026 OddsPulse &bull; Regional Constraints Active &bull; Buzz Priority
    </footer>
</div>

<button id="back-to-top" onclick="scrollToTop()">↑</button>

<script>
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    const itemsPerPage = 10;
    let buzzThreshold = 0;

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('bright-mode');
        localStorage.setItem('preferredTheme', body.classList.contains('bright-mode') ? 'bright' : 'dark');
    }
    if (localStorage.getItem('preferredTheme') === 'bright') document.body.classList.add('bright-mode');

    const topBtn = document.getElementById('back-to-top');
    window.onscroll = () => { topBtn.style.display = (window.scrollY > 300) ? "flex" : "none"; };
    function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

    function getCategory(title) {
        const t = title.toLowerCase();
        if (t.includes('election') || t.includes('trump') || t.includes('biden') || t.includes('senate') || t.includes('governor') || t.includes('us presidential')) return 'us-politics';
        if (t.includes('israel') || t.includes('ukraine') || t.includes('china') || t.includes('parliament') || t.includes('europe') || t.includes('war') || t.includes('un ')) return 'world-politics';
        if (t.includes('nba') || t.includes('nfl') || t.includes('soccer') || t.includes('bowl') || t.includes('fifa')) return 'sports';
        return 'general';
    }

    async function fetchData() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            const now = Date.now();
            const history = JSON.parse(localStorage.getItem('volumeHistory') || '{}');
            const fourHoursAgo = now - (4 * 60 * 60 * 1000);
            const groups = {};
            
            rawData.forEach(event => {
                if (!event.markets) return;
                const title = event.title.replace(/by ___ \?/g, "").trim();
                const curVol = parseFloat(event.volume || 0);
                let momentum = (parseFloat(event.volume24hr || 0)) / 6;
                if (history[title]) {
                    const past = history[title].filter(s => s.ts > fourHoursAgo);
                    if (past.length > 0) momentum = curVol - past[0].vol;
                }
                if (!history[title]) history[title] = [];
                history[title].push({ ts: now, vol: curVol });
                history[title] = history[title].filter(s => s.ts > now - (6 * 60 * 60 * 1000));

                event.markets.forEach(market => {
                    let p = 0;
                    try { p = JSON.parse(market.outcomePrices)[0]; } catch(e) { p = market.price || 0; }
                    const prob = Math.round(parseFloat(p) * 100);
                    if (prob < 5 || prob > 95) return;
                    if (!groups[title]) {
                        groups[title] = { title, slug: event.slug, buzz: momentum, volume: curVol, category: getCategory(title), markets: [] };
                    }
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            localStorage.setItem('volumeHistory', JSON.stringify(history));

            let sortedByBuzz = Object.values(groups).sort((a,b) => b.buzz - a.buzz);
            if(sortedByBuzz.length > 0) buzzThreshold = sortedByBuzz[Math.floor(sortedByBuzz.length * 0.25)].buzz;

            let counts = { us: 0, world: 0, sports: 0 };
            let finalSelection = [];

            sortedByBuzz.forEach(m => {
                const totalPol = counts.us + counts.world;
                if (m.category === 'us-politics' && counts.us < 2 && totalPol < 4) { finalSelection.push(m); counts.us++; }
                else if (m.category === 'world-politics' && counts.world < 2 && totalPol < 4) { finalSelection.push(m); counts.world++; }
                else if (m.category === 'sports' && counts.sports < 3) { finalSelection.push(m); counts.sports++; }
                else if (m.category === 'general') { finalSelection.push(m); }
            });

            allGroupedData = finalSelection;
            return true;
        } catch (e) { return false; }
    }

    function renderInitial() { filteredData = [...allGroupedData]; document.getElementById('odds-list').innerHTML = ""; currentIndex = 0; loadNext(); }
    function handleSearch() { const q = document.getElementById('search-input').value.toLowerCase(); filteredData = allGroupedData.filter(g => g.title.toLowerCase().includes(q)); document.getElementById('odds-list').innerHTML = ""; currentIndex = 0; loadNext(); }

    function formatVol(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num;
    }

    function loadNext() {
        const list = document.getElementById('odds-list');
        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        nextBatch.forEach((group, idx) => {
            group.markets.sort((a, b) => b.prob - a.prob);
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + idx}`;
            const isTrending = group.buzz >= buzzThreshold && group.buzz > 0;
            
            list.insertAdjacentHTML('beforeend', `
            <div class="event-group">
                <div class="main-market" onclick="toggleGroup('${groupId}')">
                    <div style="display:flex;align-items:center;flex-grow:1;overflow:hidden;">
                        <div class="percentage-container">
                            ${isTrending ? '<svg class="momentum-icon" viewBox="0 0 24 24"><path d="M22 7l-9.5 9.5-6-6L2 15M16 7h6v6"/></svg>' : ''}
                            <span class="percentage">${main.prob}%</span>
                        </div>
                        <div class="text">${group.title}<span class="choice-label">${main.choice}</span></div>
                        ${hasMore ? `<span style="color:var(--accent); font-weight:bold; margin-right:10px;">+</span>` : ''}
                    </div>
                    <div class="btn-group">
                        <span class="vol-pill">$${formatVol(group.volume)}</span>
                        <a href="https://polymarket.com/event/${group.slug}" target="_blank" class="bet-btn" onclick="event.stopPropagation()">Wanna Bet?</a>
                    </div>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span style="color:var(--accent); font-weight:bold; width:45px; font-size:1.1rem; text-align:right;">${m.prob}%</span>
                            <span style="flex-grow:1; color:var(--text-dim); font-size:0.85rem; padding-left:10px;">${m.choice}</span>
                            <a href="https://polymarket.com/event/${group.slug}" target="_blank" class="bet-btn" style="padding: 5px 10px;" onclick="event.stopPropagation()">Wanna Bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`);
        });
        currentIndex += itemsPerPage;
        document.getElementById('load-more-btn').style.display = (currentIndex >= filteredData.length) ? "none" : "block";
    }

    window.toggleGroup = (id) => { const el = document.getElementById(id); el.style.display = (el.style.display === "block") ? "none" : "block"; };
    (async () => { if(await fetchData()) renderInitial(); setInterval(async () => { await fetchData(); renderInitial(); }, 60000); })();
</script>
</body>
</html>
