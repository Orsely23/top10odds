name: Update Odds Data
on:
  schedule:
    - cron: '0 * * * *' # Updates every hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Fetch latest data
        run: curl https://raw.githubusercontent.com/Puter-Data/Polymarket-Mirror/main/data.json -o data.json
      - name: Commit and push
        run: |
          git config --global user.name 'Data Bot'
          git config --global user.email 'bot@top10oddslive.com'
          git add data.json
          git commit -m "Automated Data Sync" || exit 0
          git push
