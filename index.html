<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7D4T0JH70"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C7D4T0JH70');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OddsPulse | Live Intelligence</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; --accent: #00ff88; }
        body.bright-mode { --bg: #ffffff; --card: #f6f8fa; --border: #d0d7de; --text-main: #1f2328; --text-dim: #57606a; --accent: #00a35c; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 1.8rem; text-transform: uppercase; margin: 0; cursor: pointer; letter-spacing: -1px; }
        #status { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        
        #search-input { width: 100%; padding: 16px 22px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; color: var(--text-main); font-size: 1.1rem; margin: 15px 0; outline: none; }
        
        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; transition: 0.2s; }
        .event-group:hover { border-color: var(--accent); }
        .main-market { display: flex; align-items: center; padding: 14px; gap: 10px; cursor: pointer; }
        
        .perc-box { display: flex; align-items: center; justify-content: flex-end; min-width: 115px; flex-shrink: 0; }
        .percentage { color: var(--accent); font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .trending-icon { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 3; margin-right: 8px; }

        .text { flex: 1; min-width: 0; font-size: 1.1rem; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .choice-label { display: block; font-size: 0.85rem; color: var(--text-dim); font-weight: 400; margin-top: 3px; }

        .btn-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .vol-pill { background: rgba(139,148,158,0.15); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; }
        .bet-btn { background: var(--accent); color: #ffffff !important; padding: 12px 18px; border-radius: 8px; font-size: 0.95rem; font-weight: 900; text-decoration: none; text-align: center; }

        .sub-markets { display: none; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); padding: 12px; }
        .sub-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
        
        #back-to-top { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; width: 55px; height: 55px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border: none; z-index: 1000; }

        @media (max-width: 600px) {
            .percentage { font-size: 1.9rem; }
            .perc-box { min-width: 95px; }
            .text { font-size: 1rem; white-space: normal; }
            .vol-pill { padding: 6px 10px; font-size: 0.75rem; }
            .bet-btn { padding: 10px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 onclick="location.reload()">OddsPulse</h1>
        <div id="status">Syncing Pulse...</div>
    </header>

    <input type="text" id="search-input" placeholder="Search Markets..." onkeyup="handleSearch()">
    <div id="odds-list"></div>
    <button id="load-more-btn" style="width:100%; padding:18px; background:var(--card); color:var(--accent); border:1px solid var(--accent); border-radius:50px; margin:30px 0; cursor:pointer; display:none; font-weight:bold;" onclick="loadNext()">Load More</button>
</div>

<button id="back-to-top" onclick="scrollToTop()">↑</button>

<script>
    async function init() {
        const status = document.getElementById('status');
        try {
            // Force fetch with double cache-busting
            const url = 'data.json?v=' + Date.now() + Math.random();
            const response = await fetch(url, { cache: "no-store" });
            
            if (!response.ok) throw new Error("FILE_NOT_FOUND_404");
            
            const rawData = await response.json();
            if (!rawData || rawData.length === 0) throw new Error("FILE_EMPTY");

            const groups = {};
            rawData.forEach(e => {
                if (!e.markets || e.markets.length === 0) return;
                const title = e.title.replace(/by ___ \?/g, "").trim();
                
                // Categoty Logic
                let cat = 'gen';
                const t = title.toLowerCase();
                if (t.includes('trump') || t.includes('election') || t.includes('biden')) cat = 'us';
                else if (t.includes('israel') || t.includes('ukraine') || t.includes('world') || t.includes('china')) cat = 'world';
                else if (t.includes('nba') || t.includes('nfl') || t.includes('soccer')) cat = 'sports';

                e.markets.forEach(m => {
                    let p = 0;
                    try { 
                        // Gamma API Parse: Handles both string and array formats
                        let prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
                        p = Array.isArray(prices) ? prices[0] : (m.price || 0);
                    } catch(err) { p = 0; }
                    
                    const prob = Math.round(parseFloat(p) * 100);
                    if (prob < 5 || prob > 95) return;
                    
                    if (!groups[title]) {
                        groups[title] = { 
                            title, 
                            slug: e.slug, 
                            vol: parseFloat(e.volume || 0), 
                            vol24: parseFloat(e.volume24hr || 0), 
                            cat, 
                            markets: [] 
                        };
                    }
                    groups[title].markets.push({ prob, choice: m.groupItemTitle || "Yes" });
                });
            });

            // Diversification Brain: 4 Pol (2 US, 2 World), 3 Sports Max
            const sorted = Object.values(groups).sort((a,b) => b.vol24 - a.vol24);
            let counts = { us: 0, world: 0, sports: 0 };
            let final = [];
            
            sorted.forEach(m => {
                const polTotal = counts.us + counts.world;
                if (m.cat === 'us' && counts.us < 2 && polTotal < 4) { final.push(m); counts.us++; }
                else if (m.cat === 'world' && counts.world < 2 && polTotal < 4) { final.push(m); counts.world++; }
                else if (m.cat === 'sports' && counts.sports < 3) { final.push(m); counts.sports++; }
                else if (m.cat === 'gen' || final.length < 10) {
                    if (!final.find(x => x.title === m.title)) final.push(m);
                }
            });

            allGroupedData = final.slice(0, 50);
            status.innerText = "System Live";
            render();
        } catch (e) {
            status.innerText = "Sync Offline: Waiting for GitHub cache...";
            console.error("Pulse Error:", e);
            // Auto-retry every 20 seconds
            setTimeout(init, 20000);
        }
    }
    init();
</script>
</body>
</html>
