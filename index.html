<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Odds Feed</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        #status {
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #888;
        }

        .timestamp {
            color: #444;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .item {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
            padding: 15px 0;
        }

        .percentage {
            color: #00ff88;
            font-size: 32px;
            font-weight: bold;
            min-width: 90px;
        }

        .text {
            flex-grow: 1;
            font-size: 18px;
            padding-left: 10px;
        }

        .choice-label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .volume-badge {
            color: #444;
            font-size: 12px;
            border: 1px solid #222;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Essential for Infinite Scroll */
        #odds-list {
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div id="status">SCANNING...</div>
    <div id="odds-list"></div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    
    let allMarkets = []; 
    let currentIndex = 0; 
    const itemsPerPage = 15;

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            
            allMarkets = [];
            currentIndex = 0;
            list.innerHTML = "";

            // Sort by Volume
            rawData.sort((a, b) => parseFloat(b.volume || 0) - parseFloat(a.volume || 0));

            // Flatten Data
            rawData.forEach(event => {
                const markets = event.markets || [];
                markets.forEach(market => {
                    let p = 0;
                    try {
                        let rawPrices = market.outcomePrices;
                        if (typeof rawPrices === 'string') rawPrices = JSON.parse(rawPrices);
                        p = Array.isArray(rawPrices) ? parseFloat(rawPrices[0]) : parseFloat(market.price || 0);
                    } catch(e) { p = 0; }
                    
                    const prob = Math.round(p * 100);
                    if (prob >= 99 || prob <= 1 || market.active === false) return;

                    allMarkets.push({
                        prob: prob,
                        title: (event.title || "").replace(/by ___ \?/g, "").trim(),
                        choice: market.groupItemTitle || "Yes",
                        volume: event.volume
                    });
                });
            });

            status.style.color = "#00ff88";
            status.innerText = `● SCAN COMPLETE: ${allMarkets.length} MARKETS`;
            
            loadMore(); // Initial load
            
        } catch (e) {
            status.innerText = "OFFLINE";
        }
    }

    function loadMore() {
        if (currentIndex >= allMarkets.length) return;

        const nextBatch = allMarkets.slice(currentIndex, currentIndex + itemsPerPage);
        let html = "";
        
        nextBatch.forEach(item => {
            html += `
            <div class="item">
                <span class="percentage">${item.prob}%</span>
                <div class="text">
                    ${item.title}
                    <span class="choice-label">Outcome: ${item.choice}</span>
                </div>
                <span class="volume-badge">${formatVol(item.volume)}</span>
            </div>`;
        });

        list.insertAdjacentHTML('beforeend', html);
        currentIndex += itemsPerPage;
        
        // If the 10 items don't fill the screen yet, load more immediately
        if (document.documentElement.scrollHeight <= window.innerHeight && currentIndex < allMarkets.length) {
            loadMore();
        }
    }

    // Scroll Listener
    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (currentIndex < allMarkets.length) {
                loadMore();
            }
        }
    });

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>

</body>
</html>
