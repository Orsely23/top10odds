<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 50 Odds Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #1a73e8; --text-main: #202124; --text-sub: #5f6368; --bg-gray: #f8f9fa; --border: #dfe1e5; --green: #34a853; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gray); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 600; color: var(--text-main); margin-bottom: 30px; }
        .search-wrapper { width: 100%; max-width: 600px; margin-bottom: 35px; }
        #search-bar { width: 100%; padding: 14px 25px; border: 1px solid var(--border); border-radius: 30px; font-size: 16px; outline: none; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.03); width: 100%; box-sizing: border-box; }
        .container { width: 100%; max-width: 720px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.05); }
        .item { padding: 18px 24px; border-bottom: 1px solid #f3f4f6; display: grid; grid-template-columns: 85px 1fr 100px; align-items: center; gap: 15px; }
        .percentage { font-weight: 700; color: var(--primary-blue); font-size: 1.3rem; }
        .text { color: var(--text-main); font-size: 15px; line-height: 1.5; }
        .volume-badge { justify-self: end; background: #e6f4ea; color: var(--green); font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 12px; white-space: nowrap; }
        .status { font-size: 11px; color: var(--text-sub); margin-top: 30px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; }
    </style>
</head>
<body>
    <div class="logo">Top 50 Odds Live</div>
    <div class="search-wrapper">
        <input type="text" id="search-bar" placeholder="Search 50+ live markets..." onkeyup="filterMarkets()">
    </div>
    <div class="container">
        <div id="odds-list">
            <div class="item" style="display:block; text-align:center;"><span class="text">Loading Live Markets...</span></div>
        </div>
    </div>
    <div id="status" class="status">Connecting...</div>

   <script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    let allMarkets = [];

    async function init() {
    status.innerText = "Syncing Live Market Data...";
    try {
        // We use the direct GitHub Raw link first, then the CDN as a backup
        const response = await fetch('https://raw.githubusercontent.com/Puter-Data/Polymarket-Mirror/main/data.json');
        
        if (!response.ok) throw new Error("Primary Sync Failed");

        const data = await response.json();
        
        // This maps exactly to the Polymarket data structure
        allMarkets = data.slice(0, 50).map(m => ({ 
            prob: Math.round(m.probability * 100), // Ensures we get a whole number percentage
            title: m.title,
            volume: m.volume24h ? formatVol(m.volume24h) : '$--'
        }));
        
        render(allMarkets);
        status.innerText = "Live System Active • " + allMarkets.length + " Markets Loaded";
    } catch (e) {
        console.log("Switching to backup sync...");
        // Backup: The CDN (sometimes it's faster to update than Raw GitHub)
        try {
            const backupRes = await fetch('https://cdn.jsdelivr.net/gh/Puter-Data/Polymarket-Mirror@main/data.json');
            const backupData = await backupRes.json();
            allMarkets = backupData.slice(0, 50).map(m => ({ 
                prob: Math.round(m.probability * 100), 
                title: m.title,
                volume: m.volume24h ? formatVol(m.volume24h) : '$--'
            }));
            render(allMarkets);
            status.innerText = "Live System Active (Backup Sync)";
        } catch (err) {
            status.innerText = "Sync Error. Check browser console (F12).";
        }
    }
}
    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num)) return '$--';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    function render(data) {
        if (!data || data.length === 0) {
            list.innerHTML = '<div class="item" style="display:block; text-align:center;">No data found.</div>';
            return;
        }
        list.innerHTML = data.map(m => `
            <div class="item">
                <span class="percentage">${m.prob}%</span>
                <span class="text">odds that ${m.title}</span>
                <span class="volume-badge">${m.volume}</span>
            </div>
        `).join('');
    }

    function filterMarkets() {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const filtered = allMarkets.filter(m => m.title.toLowerCase().includes(query));
        render(filtered);
    }

    // Run immediately
    init();
    // Refresh every 2 minutes
    setInterval(init, 120000);
</script>
</body>

</html>
