<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 100 Odds | Live Polymarket Feed</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #00ff88;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 20px;
        }

        h1 { color: #fff; margin: 0; font-size: 2rem; }

        #status {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 10px;
            font-weight: bold;
        }

        .timestamp { text-align: center; font-size: 0.8rem; color: #484f58; margin-bottom: 20px; }

        .item {
            display: flex;
            align-items: center;
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .percentage {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            min-width: 80px;
            text-align: center;
        }

        .text { flex-grow: 1; padding: 0 20px; font-size: 1.05rem; color: #f0f6fc; }

        .choice-label { color: #8b949e; font-size: 0.85rem; display: block; margin-top: 4px; }

        .volume-badge {
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid #484f58;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP 100 LIVE ODDS</h1>
        <div id="status">Syncing Feed...</div>
    </header>
    <div id="odds-list"></div>
</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');

    async function init() {
        try {
            // THE CACHE BUSTER: This forces the browser to see the 500-item file
            const response = await fetch('./data.json?nocache=' + Date.now());
            const rawData = await response.json();
            
            // SORT BY VOLUME: High-traffic bets first
            rawData.sort((a, b) => parseFloat(b.volume || 0) - parseFloat(a.volume || 0));
            
            let html = `<div class="timestamp">Last Updated: ${new Date().toLocaleTimeString()}</div>`;
            let activeCount = 0;

            // DEEP SCAN: Loop through events, then loop through ALL markets inside them
            rawData.forEach(event => {
                const markets = event.markets || [];
                
                markets.forEach(market => {
                    try {
                        let p = 0;
                        let rawPrices = market.outcomePrices;
                        if (typeof rawPrices === 'string') rawPrices = JSON.parse(rawPrices);
                        p = Array.isArray(rawPrices) ? parseFloat(rawPrices[0]) : parseFloat(market.price || 0);

                        const prob = Math.round(p * 100);
                        
                        // PRODUCTION FILTER: Keep it clean
                        if (prob >= 99 || prob <= 1 || market.active === false) return;

                        activeCount++;
                        const eventTitle = (event.title || "").replace(/by ___ \?/g, "").trim();
                        const choice = market.groupItemTitle || "Yes";

                        html += `
                        <div class="item">
                            <span class="percentage">${prob}%</span>
                            <div class="text">
                                ${eventTitle}
                                <span class="choice-label">Outcome: ${choice}</span>
                            </div>
                            <span class="volume-badge">${formatVol(event.volume)}</span>
                        </div>`;
                    } catch (err) {}
                });
            });
            
            list.innerHTML = html;
            status.style.color = "#00ff88";
            status.innerText = `● SYSTEM LIVE: ${activeCount} MARKETS TRACKED`;
            
        } catch (e) {
            status.innerText = "Connection Error";
        }
    }

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
    setInterval(init, 300000); // Auto-refresh every 5 mins
</script>

</body>
</html>
