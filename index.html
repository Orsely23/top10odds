<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Odds Feed</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #30363d; margin-bottom: 30px; }
        h1 { color: #fff; margin: 0; font-size: 2rem; }
        #status { font-size: 0.9rem; color: #8b949e; margin-top: 10px; font-weight: bold; }
        .item { display: flex; align-items: center; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .percentage { color: #00ff88; font-size: 2rem; font-weight: bold; min-width: 85px; text-align: center; }
        .text { flex-grow: 1; padding: 0 20px; font-size: 1.1rem; color: #f0f6fc; }
        .choice-label { display: block; color: #8b949e; font-size: 0.9rem; }
        .volume-badge { background: #30363d; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        #load-btn { 
            display: block; width: 100%; padding: 20px; background: #161b22; 
            color: #8b949e; border: 1px dashed #30363d; border-radius: 8px; 
            cursor: pointer; font-weight: bold; margin-bottom: 50px; text-align: center; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP LIVE ODDS</h1>
        <div id="status">SYNCING...</div>
    </header>

    <div id="odds-list"></div>
    <div id="load-btn" onclick="loadNext()">SCROLL FOR MORE</div>
</div>

<script>
    // These connect the HTML to the logic
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    const btn = document.getElementById('load-btn');
    
    let allMarkets = []; 
    let currentIndex = 0; 
    const itemsPerPage = 15;

    async function init() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            
            allMarkets = [];
            currentIndex = 0;
            list.innerHTML = "";

            // Sort by Volume
            rawData.sort((a, b) => parseFloat(b.volume || 0) - parseFloat(a.volume || 0));

            rawData.forEach(event => {
                if (!event.markets) return;
                event.markets.forEach(market => {
                    try {
                        let p = 0;
                        let prices = market.outcomePrices;
                        if (typeof prices === 'string') prices = JSON.parse(prices);
                        p = Array.isArray(prices) ? parseFloat(prices[0]) : parseFloat(market.price || 0);
                        
                        const prob = Math.round(p * 100);
                        if (prob >= 99 || prob <= 1 || market.active === false) return;

                        allMarkets.push({
                            prob: prob,
                            title: (event.title || "").replace(/by ___ \?/g, "").trim(),
                            choice: market.groupItemTitle || "Yes",
                            volume: event.volume
                        });
                    } catch(e) {}
                });
            });

            status.style.color = "#00ff88";
            status.innerText = `● SYSTEM LIVE: ${allMarkets.length} MARKETS`;
            
            loadNext(); // First batch

        } catch (e) {
            status.innerText = "OFFLINE - RE-RUN GITHUB ACTION";
        }
    }

    function loadNext() {
        if (currentIndex >= allMarkets.length) {
            btn.innerText = "END OF LIST";
            return;
        }

        const nextBatch = allMarkets.slice(currentIndex, currentIndex + itemsPerPage);
        let html = "";
        
        nextBatch.forEach(item => {
            html += `
            <div class="item">
                <span class="percentage">${item.prob}%</span>
                <div class="text">
                    ${item.title}
                    <span class="choice-label">Outcome: ${item.choice}</span>
                </div>
                <span class="volume-badge">${formatVol(item.volume)}</span>
            </div>`;
        });

        list.insertAdjacentHTML('beforeend', html);
        currentIndex += itemsPerPage;
        btn.innerText = `LOAD MORE (${allMarkets.length - currentIndex} REMAINING)`;
    }

    // THE AUTO-SCROLL ENGINE
    window.onscroll = function() {
        // If the bottom of the page is visible, load more
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            loadNext();
        }
    };

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>

</body>
</html>
