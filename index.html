<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 50 Odds Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #1a73e8; --text-main: #202124; --text-sub: #5f6368; --bg-gray: #f8f9fa; --border: #dfe1e5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gray); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 600; color: var(--text-main); margin-bottom: 5px; }
        .tagline { color: var(--text-sub); margin-bottom: 30px; font-size: 14px; }
        .search-wrapper { width: 100%; max-width: 600px; margin-bottom: 35px; }
        #search-bar { width: 100%; padding: 14px 25px; border: 1px solid var(--border); border-radius: 30px; font-size: 16px; outline: none; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.03); box-sizing: border-box; }
        .container { width: 100%; max-width: 720px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.05); }
        .item { padding: 20px 24px; border-bottom: 1px solid #f3f4f6; display: grid; grid-template-columns: 80px 1fr 90px; align-items: center; gap: 15px; }
        .percentage { font-weight: 700; color: var(--primary-blue); font-size: 1.3rem; }
        .text { color: var(--text-main); font-size: 15px; line-height: 1.5; }
        .volume-badge { justify-self: end; background: #f1f3f4; color: var(--text-sub); font-size: 11px; font-weight: 600; padding: 6px 10px; border-radius: 8px; }
        .status { font-size: 11px; color: var(--text-sub); margin-top: 30px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; }
        .timestamp { font-size: 12px; color: var(--text-sub); text-align: center; padding: 15px; background: #fafafa; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body>
    <div class="logo">Top 50 Odds Live</div>
    <div class="tagline">Real-time prediction market data</div>
    <div class="search-wrapper"><input type="text" id="search-bar" placeholder="Search markets..." onkeyup="filterMarkets()"></div>
    <div class="container"><div id="odds-list"><div style="padding:40px; text-align:center;">Connecting to global feed...</div></div></div>
    <div id="status" class="status">Initializing...</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');
    let allMarkets = [];

    async function init() {
        status.innerText = "Processing Live Feed...";
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            if (!response.ok) throw new Error("Data file not found");
            const rawData = await response.json();
            
            allMarkets = (rawData || []).map(event => {
                const mainMarket = event.markets ? event.markets[0] : null;
                if (!mainMarket) return null;

                // 1. TITLE CLEANUP: Remove "by ___ ?" and fix spacing
                let eventTitle = (event.title || "").replace(/by ___ \?/g, "").trim();
                let marketChoice = mainMarket.groupItemTitle || "";
                let displayTitle = eventTitle;
                
                if (marketChoice && !eventTitle.includes(marketChoice)) {
                    displayTitle = `${eventTitle} (${marketChoice})`;
                }

                // 2. DEEP PRICE SEARCH: Check the whole array for the best price
                let p = 0;
                try {
                    const prices = typeof mainMarket.outcomePrices === 'string' 
                        ? JSON.parse(mainMarket.outcomePrices) 
                        : mainMarket.outcomePrices;
                    
                    if (Array.isArray(prices)) {
                        // We find the largest number in the array that isn't 1 (the 'Yes' price)
                        const validPrices = prices.map(val => parseFloat(val)).filter(val => !isNaN(val));
                        p = Math.max(...validPrices);
                    }
                } catch(e) {
                    p = parseFloat(mainMarket.price || mainMarket.lastTradePrice || 0);
                }

                // If p is 1 (glitch), we treat it as 0.5 for now or pull last trade
                if (p >= 1) p = parseFloat(mainMarket.lastTradePrice) || 0;
                
                let displayProb = Math.round(p * 100);
                if (displayProb > 99) displayProb = 99; // Cap at 99 for active markets
                if (displayProb === 0 && p > 0) displayProb = "<1";

                return { 
                    prob: displayProb, 
                    title: displayTitle,
                    volume: event.volume ? formatVol(event.volume) : '$--'
                };
            }).filter(item => item !== null);
            
            render(allMarkets);
            status.style.color = "#34a853";
            status.innerText = "● SYSTEM LIVE: DATA SYNCED";
        } catch (e) {
            console.error(e);
            status.innerText = "Syncing... (Final Calibration)";
            setTimeout(init, 5000);
        }
    }

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$--';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    function render(data) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let html = `<div class="timestamp">Live Update: ${time}</div>`;
        data.forEach(m => {
            html += `<div class="item">
                <span class="percentage">${m.prob}%</span>
                <span class="text">odds for ${m.title}</span>
                <span class="volume-badge">${m.volume}</span>
            </div>`;
        });
        list.innerHTML = html;
    }

    init();
</script>
</body>
</html>
