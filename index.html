<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Live Odds</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><path d='M20 70 l20-20 l15 15 l30-35 M85 30 l0 15 M85 30 l-15 0' stroke='%2300ff88' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
        }

        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0 20px; }
        
        #status { font-size: 0.9rem; color: var(--accent); font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .pulse-dot { width: 8px; height: 8px; background-color: var(--accent); border-radius: 50%; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 30px; }
        #search-input { width: 100%; padding: 15px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; color: #fff; font-size: 1rem; outline: none; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }

        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .main-market { display: flex; align-items: center; padding: 20px; cursor: pointer; }
        .percentage { color: var(--accent); font-size: 2.2rem; font-weight: 800; min-width: 90px; text-align: center; }
        .text { flex-grow: 1; padding: 0 20px; font-size: 1.2rem; }
        .choice-label { display: block; color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }
        .volume-badge { background: rgba(48,54,61,0.5); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--text-dim); }

        .bet-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; text-decoration: none; margin-left: 10px; }
        .bet-btn:hover { background: var(--accent); color: #000; }

        .sub-markets { display: none; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); padding: 10px 20px 20px 110px; }
        .sub-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }

        #load-more-btn {
            width: 100%;
            padding: 20px;
            background: var(--card);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            text-transform: uppercase;
        }
        #load-more-btn:hover { background: var(--accent); color: #000; }

        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TOP 10 LIVE ODDS</h1>
        <div id="status"><span class="pulse-dot"></span> <span id="status-text">SYNCING...</span></div>
        <div id="last-update" style="font-size:0.7rem; color:var(--text-dim); margin-top:5px; text-align:center;">Checking for updates...</div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search markets..." onkeyup="handleSearch()">
    </div>

    <div id="odds-list"></div>
    
    <button id="load-more-btn" onclick="loadNext()">Load More Results</button>

    <footer>
        Data powered by <a href="https://polymarket.com" target="_blank" style="color:var(--accent)">Polymarket</a><br><br>
        &copy; 2026 Top 10 Live Odds
    </footer>
</div>

<script>
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    const itemsPerPage = 20;

    async function fetchData() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            
            const groups = {};
            rawData.forEach(event => {
                if (!event || !event.markets) return;
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                const slug = event.slug || "";
                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let pr = market.outcomePrices;
                        if (typeof pr === 'string') pr = JSON.parse(pr);
                        p = Array.isArray(pr) ? parseFloat(pr[0]) : parseFloat(market.price || 0);
                    } catch(e){}
                    const prob = Math.round(p * 100);
                    if (prob < 5 || prob > 95) return;
                    if (!groups[title]) groups[title] = { title, slug, volume: parseFloat(event.volume || 0), markets: [] };
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            allGroupedData = Object.values(groups).filter(g => g.markets.length > 0).sort((a,b) => b.volume - a.volume);
            allGroupedData.forEach(g => g.markets.sort((a,b) => b.prob - a.prob));
            
            const now = new Date();
            document.getElementById('last-update').innerText = `LAST SYNC: ${now.toLocaleTimeString()}`;
            document.getElementById('status-text').innerText = `SYSTEM LIVE: ${allGroupedData.length} TOPICS`;
            
            return true;
        } catch (e) {
            document.getElementById('status-text').innerText = "OFFLINE";
            return false;
        }
    }

    function renderInitial() {
        filteredData = [...allGroupedData];
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        filteredData = allGroupedData.filter(g => g.title.toLowerCase().includes(query) || g.markets.some(m => m.choice.toLowerCase().includes(query)));
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function loadNext() {
        const list = document.getElementById('odds-list');
        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        
        nextBatch.forEach((group, idx) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + idx}`;
            const betUrl = group.slug ? `https://polymarket.com/event/${group.slug}` : `https://polymarket.com`;

            const html = `
            <div class="event-group">
                <div class="main-market">
                    <div style="display:flex;align-items:center;flex-grow:1;" onclick="toggleGroup('${groupId}')">
                        <span class="percentage">${main.prob}%</span>
                        <div class="text">${group.title}<span class="choice-label">Lead: ${main.choice}</span></div>
                        <span class="volume-badge">$${(group.volume/1000).toFixed(0)}K</span>
                    </div>
                    <a href="${betUrl}" target="_blank" class="bet-btn">Bet</a>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span style="color:var(--accent); font-weight:bold; width:40px;">${m.prob}%</span>
                            <span style="flex-grow:1; color:var(--text-dim);">${m.choice}</span>
                            <a href="${betUrl}" target="_blank" class="bet-btn" style="font-size:0.7rem;">Bet</a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });

        currentIndex += itemsPerPage;
        document.getElementById('load-more-btn').style.display = (currentIndex >= filteredData.length) ? "none" : "block";
    }

    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    };

    // INIT AND 1-MINUTE SYNC
    (async () => {
        await fetchData();
        renderInitial();
        
        // Check for new data every 60 seconds
        setInterval(async () => {
            console.log("Syncing with Polymarket...");
            const success = await fetchData();
            // Optional: You could auto-refresh the list here, 
            // but it's safer to let the user finish reading.
        }, 60000);
    })();
</script>
</body>
</html>
