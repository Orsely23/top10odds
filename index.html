<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7D4T0JH70"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C7D4T0JH70');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Top 10 Odds Live | Real-Time Polymarket Tracking</title>
    <meta name="description" content="Get the top 10 live odds from Polymarket. Real-time predictions, volume tracking, and market trends.">
    <meta property="og:title" content="Top 10 Odds Live | Real-Time Market Predictions">
    <meta property="og:description" content="Track the biggest moves in the prediction markets. Updated live.">
    <meta property="og:url" content="https://www.top10oddslive.com">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Odds Live">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><path d='M20 70 l20-20 l15 15 l30-35 M85 30 l0 15 M85 30 l-15 0' stroke='%2300ff88' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
            --search-bg: #161b22;
        }

        body.bright-mode {
            --bg: #ffffff;
            --card: #f6f8fa;
            --border: #d0d7de;
            --text-main: #1f2328;
            --text-dim: #57606a;
            --accent: #00a35c;
            --search-bg: #ffffff;
        }

        * { box-sizing: border-box; }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 10px; scroll-behavior: smooth; transition: 0.3s; 
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; padding: 25px 0 10px; position: relative; }
        
        #theme-toggle {
            position: absolute; top: 0; right: 0;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-main); padding: 6px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }

        h1 { font-size: 1.6rem; margin: 15px 0 5px; letter-spacing: -0.5px; }
        #status { font-size: 0.75rem; color: var(--accent); font-weight: bold; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; }
        .pulse-dot { width: 7px; height: 7px; background-color: var(--accent); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); } 
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } 
        }

        .search-container { position: sticky; top: 10px; z-index: 100; margin: 15px 0 20px 0; }
        #search-input { 
            width: 100%; padding: 14px 22px; background: var(--search-bg); 
            border: 2px solid var(--border); border-radius: 50px; color: var(--text-main); 
            font-size: 1rem; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #install-banner {
            display: none; background: var(--accent); color: #000; padding: 15px; 
            border-radius: 12px; margin: 10px 0 20px 0; text-align: center; 
            font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,136,0.3);
            text-transform: uppercase; font-size: 0.85rem;
        }

        /* 2-ROW MOBILE LAYOUT */
        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 16px; overflow: hidden; }
        
        .main-market { 
            display: flex; 
            flex-direction: column; /* Stacked on mobile */
            padding: 16px; 
        }

        .top-row {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        .percentage { 
            color: var(--accent); 
            font-size: 2.2rem; 
            font-weight: 900; 
            min-width: 80px; 
            line-height: 1;
        }

        .text { 
            flex-grow: 1; 
            padding-left: 10px; 
            font-size: 1.1rem; 
            line-height: 1.2; 
            font-weight: 700; 
        }

        .choice-label { 
            font-size: 0.85rem; 
            color: var(--text-dim); 
            font-weight: normal; 
        }

        .bet-btn { 
            background: var(--accent); color: #000; 
            padding: 10px 18px; border-radius: 10px; 
            font-size: 0.8rem; font-weight: 900; 
            text-decoration: none; text-transform: uppercase; 
            white-space: nowrap;
        }
        body.bright-mode .bet-btn { color: #fff; }

        .sub-markets { display: none; background: rgba(0,0,0,0.2); padding: 10px 16px 16px; }
        .sub-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }

        /* DESKTOP REFINEMENT */
        @media (min-width: 600px) {
            .main-market { flex-direction: row; align-items: center; padding: 20px; }
            .top-row { margin-bottom: 0; width: auto; flex-grow: 1; }
            .bottom-row { width: auto; border-top: none; padding-top: 0; margin-left: 20px; }
            .text { padding-left: 20px; }
        }

        #load-more-btn { width: 100%; padding: 18px; background: var(--card); color: var(--accent); border: 2px solid var(--accent); border-radius: 50px; font-weight: bold; cursor: pointer; margin: 20px 0 50px 0; }
        footer { text-align: center; padding: 40px 10px; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--border); }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header id="top">
        <button id="theme-toggle" onclick="toggleTheme()">☀️ Bright Mode</button>
        <h1>TOP 10 ODDS LIVE</h1>
        <div id="status"><span class="pulse-dot"></span> <span id="status-text">SCANNING MARKETS...</span></div>
        <div id="last-update" style="font-size:0.65rem; color:var(--text-dim); margin-top:5px;">Initializing Stream...</div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search live odds..." onkeyup="handleSearch()">
    </div>

    <div id="install-banner" onclick="handleInstallClick()">
        <span id="install-text">Install Odds Live App</span>
    </div>

    <div id="odds-list"></div>
    <button id="load-more-btn" onclick="loadNext()">Load More Results</button>

    <footer>
        <div class="footer-links">Data via <a href="https://polymarket.com" target="_blank">Polymarket</a></div>
        <p style="margin: 10px 0;">Aggregated live prediction data for informational use.</p>
        &copy; 2026 Top 10 Odds Live
    </footer>
</div>

<script>
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    const itemsPerPage = 10;
    let deferredPrompt;

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('bright-mode');
        const isBright = body.classList.contains('bright-mode');
        btn.innerHTML = isBright ? "🌙 Dark Mode" : "☀️ Bright Mode";
        localStorage.setItem('preferredTheme', isBright ? 'bright' : 'dark');
    }
    if (localStorage.getItem('preferredTheme') === 'bright') {
        document.body.classList.add('bright-mode');
        document.getElementById('theme-toggle').innerHTML = "🌙 Dark Mode";
    }

    const installBanner = document.getElementById('install-banner');
    const installText = document.getElementById('install-text');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';
    });

    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
        installBanner.style.display = 'block';
        installText.innerText = "Add to Home Screen 📱";
    }

    async function handleInstallClick() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBanner.style.display = 'none';
            deferredPrompt = null;
        } else if (isIos()) {
            alert("To install: Tap the 'Share' icon (square with arrow) at the bottom and select 'Add to Home Screen'.");
        }
    }

    async function fetchData() {
        try {
            document.getElementById('status-text').innerText = "SCANNING MARKETS...";
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            const groups = {};
            
            rawData.forEach(event => {
                if (!event || !event.markets) return;
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let pr = market.outcomePrices;
                        if (typeof pr === 'string') pr = JSON.parse(pr);
                        p = Array.isArray(pr) ? parseFloat(pr[0]) : parseFloat(market.price || 0);
                    } catch(e){}
                    const prob = Math.round(p * 100);
                    if (prob < 5 || prob > 95) return;
                    if (!groups[title]) {
                        groups[title] = { title, slug: event.slug, volume: parseFloat(event.volume || 0), markets: [] };
                    }
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            allGroupedData = Object.values(groups).filter(g => g.markets.length > 0).sort((a,b) => b.volume - a.volume);
            allGroupedData.forEach(g => g.markets.sort((a,b) => b.prob - a.prob));
            
            document.getElementById('last-update').innerText = `SYNCED: ${new Date().toLocaleTimeString()}`;
            document.getElementById('status-text').innerText = `SYSTEM LIVE: ${allGroupedData.length} MARKETS`;
            return true;
        } catch (e) { 
            document.getElementById('status-text').innerText = "SYNC OFFLINE";
            return false; 
        }
    }

    function renderInitial() {
        filteredData = [...allGroupedData];
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        filteredData = allGroupedData.filter(g => g.title.toLowerCase().includes(query));
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function loadNext() {
        const list = document.getElementById('odds-list');
        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        nextBatch.forEach((group, idx) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + idx}`;
            const betUrl = group.slug ? `https://polymarket.com/event/${group.slug}` : `https://polymarket.com`;
            const html = `
            <div class="event-group">
                <div class="main-market">
                    <div class="top-row" onclick="toggleGroup('${groupId}')">
                        <span class="percentage">${main.prob}%</span>
                        <div class="text">${group.title}</div>
                        ${hasMore ? `<span style="color:var(--accent); font-weight:bold; font-size:1.4rem; padding:0 10px;">+</span>` : ''}
                    </div>
                    <div class="bottom-row">
                        <span class="choice-label">${main.choice}</span>
                        <a href="${betUrl}" target="_blank" class="bet-btn">Wanna Bet?</a>
                    </div>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <div style="display:flex; align-items:center;">
                                <span style="color:var(--accent); font-weight:bold; width:45px; font-size:1.1rem;">${m.prob}%</span>
                                <span style="color:var(--text-dim); font-size:0.9rem; padding-left:10px;">${m.choice}</span>
                            </div>
                            <a href="${betUrl}" target="_blank" class="bet-btn" style="padding: 8px 12px; font-size:0.7rem;">Wanna Bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });
        currentIndex += itemsPerPage;
        document.getElementById('load-more-btn').style.display = (currentIndex >= filteredData.length) ? "none" : "block";
    }

    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW Registered'));
        });
    }

    (async () => {
        const success = await fetchData();
        if(success) renderInitial();
        setInterval(async () => { await fetchData(); }, 60000);
    })();
</script>
</body>
</html>
