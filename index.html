<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 50 Odds Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;600&display=swap" rel="stylesheet">
   <style>
    /* Add this to keep the list from feeling cluttered */
    #odds-list {
        max-width: 800px;
        margin: 0 auto;
        padding-bottom: 50px;
    }
    .item {
        display: flex;
        align-items: center;
        padding: 12px; /* Slightly tighter padding */
        border-bottom: 1px solid #333;
        transition: background 0.2s;
    }
    .item:hover {
        background: rgba(255, 255, 255, 0.05);
    }
</style>
</head>
<body>
    <div class="logo">Top 50 Odds Live</div>
    <div class="tagline">Real-time prediction market data</div>
    <div class="search-wrapper"><input type="text" id="search-bar" placeholder="Search markets..." onkeyup="filterMarkets()"></div>
    <div class="container"><div id="odds-list"><div style="padding:40px; text-align:center;">Connecting to global feed...</div></div></div>
    <div id="status" class="status">Initializing...</div>

<script>
    const list = document.getElementById('odds-list');
    const status = document.getElementById('status');

    async function init() {
        status.innerText = "Syncing Live Odds...";
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            
            let html = `<div class="timestamp">Last Updated: ${new Date().toLocaleTimeString()}</div>`;
            let activeCount = 0;

            rawData.forEach(event => {
                try {
                    const mainMarket = event.markets ? event.markets[0] : null;
                    if (!mainMarket) return;

                    let p = 0;
                    let rawPrices = mainMarket.outcomePrices;
                    if (typeof rawPrices === 'string') rawPrices = JSON.parse(rawPrices);
                    p = Array.isArray(rawPrices) ? parseFloat(rawPrices[0]) : parseFloat(mainMarket.price || 0);

                    const prob = Math.round(p * 100);
                    
                    // The "Clean" Filter: Hide the junk
                    if (prob >= 99 || prob <= 1 || mainMarket.active === false) return;

                    activeCount++;
                    const eventTitle = (event.title || "").replace(/by ___ \?/g, "").trim();
                    const choice = mainMarket.groupItemTitle || "";

                    html += `
                    <div class="item">
                        <span class="percentage">${prob}%</span>
                        <div class="text">
                            odds for ${eventTitle} ${choice ? `(${choice})` : ''}
                        </div>
                        <span class="volume-badge">${formatVol(event.volume)}</span>
                    </div>`;
                } catch (err) { /* Skip messy items */ }
            });
            
            list.innerHTML = html;
            status.style.color = "#00ff88";
            status.innerText = `● SYSTEM LIVE: ${activeCount} MARKETS TRACKED`;
        } catch (e) {
            status.innerText = "Connection Error";
        }
    }

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$--';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
        return '$' + Math.round(num);
    }

    init();
</script>
</body>
</html>
