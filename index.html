<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7D4T0JH70"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C7D4T0JH70');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OddsPulse | Manual Pulse Only</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; --accent: #00ff88; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 1.8rem; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        #status { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        
        /* MANUAL UPDATE BUTTON */
        .sync-trigger { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-bottom: 20px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
        .sync-trigger:active { transform: scale(0.98); }

        #search-input { width: 100%; padding: 16px 22px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; color: var(--text-main); font-size: 1.1rem; margin-bottom: 15px; outline: none; }
        
        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; position: relative; }
        .main-market { display: flex; align-items: center; padding: 14px; gap: 10px; cursor: pointer; }
        
        .perc-box { display: flex; align-items: center; justify-content: flex-end; min-width: 130px; flex-shrink: 0; }
        .percentage { color: var(--accent); font-size: 2.2rem; font-weight: 800; line-height: 1; }
        
        /* THE PLUS ICON */
        .expand-icon { color: var(--accent); font-size: 1.6rem; font-weight: 900; margin-left: 12px; width: 25px; text-align: center; }

        .trending-icon { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 3; margin-right: 8px; }

        .text { flex: 1; min-width: 0; font-size: 1.15rem; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .choice-label { display: block; font-size: 0.85rem; color: var(--text-dim); font-weight: 400; margin-top: 3px; }

        .btn-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .vol-pill { background: rgba(139,148,158,0.15); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; }
        
        /* Wanna Bet? - STRICT BLACK TEXT */
        .bet-btn { background: var(--accent); color: #000000 !important; padding: 12px 18px; border-radius: 8px; font-size: 0.95rem; font-weight: 900; text-decoration: none; text-align: center; }

        .sub-markets { display: none; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); padding: 12px; }
        .sub-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .sub-item:last-child { border-bottom: none; }
        
        #back-to-top { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; width: 50px; height: 50px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border: none; z-index: 1000; }

        @media (max-width: 600px) {
            .percentage { font-size: 1.8rem; }
            .text { font-size: 1rem; white-space: normal; }
            .btn-group { flex-direction: column; align-items: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OddsPulse</h1>
        <div id="status">Standby</div>
    </header>

    <button class="sync-trigger" id="sync-btn" onclick="fetchLivePulse()">UPDATE LIVE ODDS</button>

    <input type="text" id="search-input" placeholder="Search Momentum..." onkeyup="handleSearch()">
    <div id="odds-list"></div>
    <button id="load-more-btn" style="width:100%; padding:18px; background:var(--card); color:var(--accent); border:1px solid var(--accent); border-radius:50px; margin:30px 0; cursor:pointer; display:none; font-weight:bold;" onclick="loadNext()">Load More</button>
</div>

<button id="back-to-top" onclick="scrollToTop()">↑</button>

<script>
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 

    async function fetchLivePulse() {
        const btn = document.getElementById('sync-btn');
        const status = document.getElementById('status');
        btn.innerText = "FETCHING FRESH DATA...";
        btn.disabled = true;
        
        try {
            // MANUAL TRIGGER: Using a proxy to bypass browser CORS blocks
            const target = "https://gamma-api.polymarket.com/events?active=true&closed=false&limit=300&order=volume_24hr&ascending=false";
            const url = "https://corsproxy.io/?" + encodeURIComponent(target);
            
            const response = await fetch(url);
            if (!response.ok) throw new Error("Proxy Throttled");
            const rawData = await response.json();
            
            processPulseData(rawData);
            status.innerText = "Pulse Captured: " + new Date().toLocaleTimeString();
        } catch (e) {
            status.innerText = "Direct Sync Failed. Using Cached Data.";
            // Fallback to whatever is in data.json if the proxy fails
            const fallback = await fetch('data.json?v=' + Date.now());
            const fbData = await fallback.json();
            processPulseData(fbData);
        } finally {
            btn.innerText = "UPDATE LIVE ODDS";
            btn.disabled = false;
        }
    }

    function processPulseData(dataArray) {
        const groups = {};
        dataArray.forEach(e => {
            if (!e.markets || !e.title) return;
            const title = e.title.replace(/by ___ \?/g, "").trim();
            const vol24 = parseFloat(e.volume24hr || 0);

            // CATEGORY BUCKETS
            let cat = 'gen';
            const t = title.toLowerCase();
            if (t.includes('trump') || t.includes('election') || t.includes('biden') || t.includes('senate') || t.includes('house')) cat = 'us';
            else if (t.includes('israel') || t.includes('ukraine') || t.includes('china') || t.includes('world') || t.includes('gaza') || t.includes('putin') || t.includes('iran')) cat = 'world';
            else if (t.includes('nba') || t.includes('nfl') || t.includes('soccer') || t.includes('fifa') || t.includes('champions')) cat = 'sports';

            e.markets.forEach(m => {
                let p = 0;
                try { 
                    let prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
                    p = Array.isArray(prices) ? prices[0] : (m.price || 0);
                } catch(err) { p = 0; }
                
                const prob = Math.round(parseFloat(p) * 100);
                if (prob < 2 || prob > 98) return; 

                // CLUSTERING BY TITLE
                if (!groups[title]) {
                    groups[title] = { title, slug: e.slug, vol: parseFloat(e.volume || 0), vol24, cat, markets: [] };
                }
                groups[title].markets.push({ prob, choice: m.groupItemTitle || "Yes" });
            });
        });

        const sorted = Object.values(groups).sort((a,b) => b.vol24 - a.vol24);
        
        // BRAIN: FORCE DIVERSITY (2 US, 2 World, 3 Sports)
        let usPool = sorted.filter(m => m.cat === 'us');
        let worldPool = sorted.filter(m => m.cat === 'world');
        let sportsPool = sorted.filter(m => m.cat === 'sports');

        let final = [];
        final.push(...usPool.slice(0, 2));
        final.push(...worldPool.slice(0, 2));
        final.push(...sportsPool.slice(0, 3));
        
        const usedTitles = new Set(final.map(f => f.title));
        sorted.forEach(m => {
            if (final.length < 50 && !usedTitles.has(m.title)) {
                final.push(m);
                usedTitles.add(m.title);
            }
        });

        allGroupedData = final.sort((a,b) => b.vol24 - a.vol24);
        render();
    }

    function formatV(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : n; }

    function render() { filteredData = [...allGroupedData]; document.getElementById('odds-list').innerHTML = ""; currentIndex = 0; loadNext(); }
    
    function loadNext() {
        const list = document.getElementById('odds-list');
        const batch = filteredData.slice(currentIndex, currentIndex + 10);
        batch.forEach((g, i) => {
            g.markets.sort((a,b) => b.prob - a.prob);
            const main = g.markets[0];
            const id = `g-${currentIndex + i}`;
            const trending = (currentIndex + i < 3 && currentIndex === 0);
            const isCluster = g.markets.length > 1;

            list.insertAdjacentHTML('beforeend', `
            <div class="event-group">
                <div class="main-market" onclick="toggleGroup('${id}')">
                    <div class="perc-box">
                        ${trending ? '<svg class="trending-icon" viewBox="0 0 24 24"><path d="M22 7l-9.5 9.5-6-6L2 15M16 7h6v6"/></svg>' : ''}
                        <span class="percentage">${main.prob}%</span>
                        ${isCluster ? '<span class="expand-icon" id="icon-'+id+'">+</span>' : ''}
                    </div>
                    <div class="text">${g.title}<span class="choice-label">${main.choice}</span></div>
                    <div class="btn-group">
                        <span class="vol-pill">$${formatV(g.vol)}</span>
                        <a href="https://polymarket.com/event/${g.slug}" target="_blank" class="bet-btn" onclick="event.stopPropagation()">Wanna Bet?</a>
                    </div>
                </div>
                <div class="sub-markets" id="${id}">
                    ${g.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span style="color:var(--accent); font-weight:800; width:65px; text-align:right; font-size:1.4rem;">${m.prob}%</span>
                            <span style="flex:1; padding-left:15px; color:var(--text-dim); font-size:1.1rem;">${m.choice}</span>
                            <a href="https://polymarket.com/event/${g.slug}" target="_blank" class="bet-btn" style="padding:10px 14px; font-size:0.85rem; color:#000 !important;">Wanna Bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`);
        });
        currentIndex += 10;
        document.getElementById('load-more-btn').style.display = currentIndex >= filteredData.length ? "none" : "block";
    }

    function handleSearch() { const q = document.getElementById('search-input').value.toLowerCase(); filteredData = allGroupedData.filter(m => m.title.toLowerCase().includes(q)); document.getElementById('odds-list').innerHTML = ""; currentIndex = 0; loadNext(); }
    function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
    
    window.toggleGroup = id => { 
        const e = document.getElementById(id); 
        const icon = document.getElementById('icon-'+id);
        if (e.style.display === "block") {
            e.style.display = "none";
            if(icon) icon.innerText = "+";
        } else {
            e.style.display = "block";
            if(icon) icon.innerText = "-";
        }
    };
    
    window.onscroll = () => document.getElementById('back-to-top').style.display = (window.scrollY > 300) ? "flex" : "none";

    // Auto-load once when the page is opened
    fetchLivePulse();
</script>
</body>
</html>
