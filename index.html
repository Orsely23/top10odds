<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C7D4T0JH70"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C7D4T0JH70');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Live Odds</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><path d='M20 70 l20-20 l15 15 l30-35 M85 30 l0 15 M85 30 l-15 0' stroke='%2300ff88' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent: #00ff88;
            --search-bg: #161b22;
        }

        body.bright-mode {
            --bg: #ffffff;
            --card: #f6f8fa;
            --border: #d0d7de;
            --text-main: #1f2328;
            --text-dim: #57606a;
            --accent: #00a35c;
            --search-bg: #ffffff;
        }

        * { box-sizing: border-box; }

        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; scroll-behavior: smooth; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; padding: 40px 0 20px; position: relative; }
        
        #theme-toggle {
            position: absolute; top: 10px; right: 0;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }

        #status { font-size: 0.9rem; color: var(--accent); font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .pulse-dot { width: 8px; height: 8px; background-color: var(--accent); border-radius: 50%; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 30px; width: 100%; }
        #search-input { 
            width: 100%; padding: 15px 20px; background: var(--search-bg); 
            border: 1px solid var(--border); border-radius: 30px; 
            color: var(--text-main); font-size: 1rem; outline: none; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); transition: all 0.2s;
            display: block;
        }
        #search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .event-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; transition: 0.2s; }
        .event-group:hover { border-color: var(--accent); }
        
        .main-market { display: flex; align-items: center; padding: 20px; cursor: pointer; }
        .percentage { color: var(--accent); font-size: 2.2rem; font-weight: 800; min-width: 90px; text-align: center; }
        .text { flex-grow: 1; padding: 0 20px; font-size: 1.2rem; }
        .choice-label { display: block; color: var(--text-dim); font-size: 0.95rem; margin-top: 4px; }
        .volume-badge { background: rgba(128,128,128,0.1); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--text-dim); }

        .bet-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-decoration: none; margin-left: 10px; white-space: nowrap; transition: 0.2s; }
        .bet-btn:hover { background: var(--accent); color: white; }
        body:not(.bright-mode) .bet-btn:hover { color: #000; }

        .sub-markets { display: none; background: rgba(128,128,128,0.05); border-top: 1px solid var(--border); padding: 10px 20px 20px 110px; }
        .sub-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }

        #load-more-btn {
            width: 100%; padding: 20px; background: var(--card); color: var(--accent); 
            border: 2px solid var(--accent); border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin: 20px 0 60px 0; text-transform: uppercase; transition: 0.2s;
        }
        #load-more-btn:hover { background: var(--accent); color: white; }
        body:not(.bright-mode) #load-more-btn:hover { color: #000; }

        #back-to-top {
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; 
            background: var(--accent); color: white; border-radius: 50%; display: none; 
            align-items: center; justify-content: center; font-size: 1.5rem; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
        }
        body:not(.bright-mode) #back-to-top { color: #000; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; line-height: 1.6; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header id="top">
        <button id="theme-toggle" onclick="toggleTheme()">☀️ Bright Mode</button>
        <h1>TOP 10 LIVE ODDS</h1>
        <div id="status"><span class="pulse-dot"></span> <span id="status-text">SYNCING...</span></div>
        <div id="last-update" style="font-size:0.75rem; color:var(--text-dim); margin-top:5px; text-align:center;">Checking for updates...</div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search live markets..." onkeyup="handleSearch()">
    </div>

    <div id="odds-list"></div>
    <button id="load-more-btn" onclick="loadNext()">Load More Results</button>

    <footer>
        <div class="footer-links">Data powered by <a href="https://polymarket.com" target="_blank">Polymarket</a></div>
        <p style="max-width: 600px; margin: 15px auto;">Independent aggregator. Odds for informational purposes only.</p>
        &copy; 2026 Top 10 Live Odds
    </footer>
</div>

<div id="back-to-top" onclick="window.scrollTo(0,0)">↑</div>

<script>
    let allGroupedData = []; 
    let filteredData = [];   
    let currentIndex = 0; 
    const itemsPerPage = 10;
    const backToTopBtn = document.getElementById('back-to-top');

    // MODIFIED TOGGLE LOGIC
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('bright-mode');
        
        const isBright = body.classList.contains('bright-mode');
        btn.innerHTML = isBright ? "🌙 Dark Mode" : "☀️ Bright Mode";
        
        // Save choice to memory
        localStorage.setItem('preferredTheme', isBright ? 'bright' : 'dark');
    }

    // Apply saved theme on startup
    if (localStorage.getItem('preferredTheme') === 'bright') {
        document.body.classList.add('bright-mode');
        document.getElementById('theme-toggle').innerHTML = "🌙 Dark Mode";
    }

    window.onscroll = function() {
        if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
            backToTopBtn.style.display = "flex";
        } else {
            backToTopBtn.style.display = "none";
        }
    };

    function formatVol(n) {
        let num = parseFloat(n);
        if (isNaN(num) || num === 0) return '$0';
        if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return '$' + (num / 1000).toFixed(0) + 'K';
        return '$' + Math.round(num);
    }

    async function fetchData() {
        try {
            const response = await fetch('./data.json?v=' + Date.now());
            const rawData = await response.json();
            const groups = {};
            rawData.forEach(event => {
                if (!event || !event.markets) return;
                const title = (event.title || "").replace(/by ___ \?/g, "").trim();
                const slug = event.slug || "";
                event.markets.forEach(market => {
                    let p = 0;
                    try {
                        let pr = market.outcomePrices;
                        if (typeof pr === 'string') pr = JSON.parse(pr);
                        p = Array.isArray(pr) ? parseFloat(pr[0]) : parseFloat(market.price || 0);
                    } catch(e){}
                    const prob = Math.round(p * 100);
                    if (prob < 5 || prob > 95) return;
                    if (!groups[title]) {
                        groups[title] = { title, slug, volume: parseFloat(event.volume || 0), markets: [] };
                    }
                    groups[title].markets.push({ prob, choice: market.groupItemTitle || "Yes" });
                });
            });

            allGroupedData = Object.values(groups).filter(g => g.markets.length > 0).sort((a,b) => b.volume - a.volume);
            allGroupedData.forEach(g => g.markets.sort((a,b) => b.prob - a.prob));
            const now = new Date();
            document.getElementById('last-update').innerText = `LAST SYNC: ${now.toLocaleTimeString()}`;
            document.getElementById('status-text').innerText = `SYSTEM LIVE: ${allGroupedData.length} TOPICS`;
            return true;
        } catch (e) { return false; }
    }

    function renderInitial() {
        filteredData = [...allGroupedData];
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        filteredData = allGroupedData.filter(g => g.title.toLowerCase().includes(query) || g.markets.some(m => m.choice.toLowerCase().includes(query)));
        document.getElementById('odds-list').innerHTML = "";
        currentIndex = 0;
        loadNext();
    }

    function loadNext() {
        const list = document.getElementById('odds-list');
        const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsPerPage);
        nextBatch.forEach((group, idx) => {
            const main = group.markets[0];
            const hasMore = group.markets.length > 1;
            const groupId = `group-${currentIndex + idx}`;
            const betUrl = group.slug ? `https://polymarket.com/event/${group.slug}` : `https://polymarket.com`;
            const html = `
            <div class="event-group">
                <div class="main-market">
                    <div style="display:flex;align-items:center;flex-grow:1;" onclick="toggleGroup('${groupId}')">
                        <span class="percentage">${main.prob}%</span>
                        <div class="text">${group.title}<span class="choice-label">Front-runner: ${main.choice}</span></div>
                        <span class="volume-badge">${formatVol(group.volume)}</span>
                        ${hasMore ? `<span style="color:var(--accent); font-weight:bold; margin-left:15px;">+</span>` : ''}
                    </div>
                    <a href="${betUrl}" target="_blank" class="bet-btn">Wanna bet?</a>
                </div>
                <div class="sub-markets" id="${groupId}">
                    ${group.markets.slice(1).map(m => `
                        <div class="sub-item">
                            <span style="color:var(--accent); font-weight:bold; width:50px;">${m.prob}%</span>
                            <span style="flex-grow:1; color:var(--text-dim);">${m.choice}</span>
                            <a href="${betUrl}" target="_blank" class="bet-btn" style="font-size:0.75rem; padding: 4px 10px;">Wanna bet?</a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });
        currentIndex += itemsPerPage;
        document.getElementById('load-more-btn').style.display = (currentIndex >= filteredData.length) ? "none" : "block";
    }

    window.toggleGroup = function(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    };

    (async () => {
        await fetchData();
        renderInitial();
        setInterval(async () => { await fetchData(); }, 60000);
    })();
</script>
</body>
</html>
